<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gaussian classifier</title><style>body{font-family:system-ui;margin:24px;background:#fafafa;color:#222}a{color:#2454a6}.wrap{max-width:1100px;margin:auto;display:grid;grid-template-columns:680px 1fr;gap:22px}.card{background:white;border:1px solid #ddd;border-radius:16px;padding:18px;box-shadow:0 2px 10px #0001}svg{width:100%;height:auto;background:white;border:1px solid #eee;border-radius:12px}label{font-weight:700;display:block;margin-top:12px}input{width:100%}.v{font-family:monospace;background:#eee;border-radius:6px;padding:2px 6px}.note{line-height:1.45;color:#444}code{background:#f1f1f1;padding:2px 5px;border-radius:4px}</style></head><body><p><a href="index.html">← index</a></p><div class="wrap"><div class="card"><h1>Gaussian classifier</h1><svg id="s" viewBox="0 0 680 520"></svg></div><div class="card"><label>prior class blue π = <span id="pv" class="v"></span></label><input id="prior" type="range" min="5" max="95" value="50"><div class="note">Un modello generativo confronta f(x|classe)·P(classe). Cambiando il prior, la soglia decisionale si sposta anche se le densità restano uguali.</div></div></div><script>const svg=document.getElementById('s'),W=680,H=520,m=50,xmin=-6,xmax=6,ymin=-1,ymax=5;function sx(x){return m+(x-xmin)/(xmax-xmin)*(W-2*m)}function sy(y){return H-m-(y-ymin)/(ymax-ymin)*(H-2*m)}function grid(){let h='';for(let k=-6;k<=6;k++)h+=`<line x1="${sx(k)}" y1="${sy(ymin)}" x2="${sx(k)}" y2="${sy(ymax)}" stroke="#eee"/>`;for(let k=-1;k<=5;k++)h+=`<line x1="${sx(xmin)}" y1="${sy(k)}" x2="${sx(xmax)}" y2="${sy(k)}" stroke="#eee"/>`;h+=`<line x1="${sx(xmin)}" y1="${sy(0)}" x2="${sx(xmax)}" y2="${sy(0)}" stroke="#aaa"/>`;return h}function L(x1,y1,x2,y2,c,w=3){return `<line x1="${sx(x1)}" y1="${sy(y1)}" x2="${sx(x2)}" y2="${sy(y2)}" stroke="${c}" stroke-width="${w}"/>`}function C(x,y,c,r=7){return `<circle cx="${sx(x)}" cy="${sy(y)}" r="${r}" fill="${c}" stroke="#222"/>`}function pdf(x,mu,s){return 1/(Math.sqrt(2*Math.PI)*s)*Math.exp(-.5*((x-mu)/s)**2)}function upd(){let p=+prior.value/100;pv.textContent=p.toFixed(2);let h=grid(),pa=null,pb=null,thr=[];for(let i=0;i<=400;i++){let x=xmin+(xmax-xmin)*i/400,y1=p*pdf(x,-1.5,1)*8,y0=(1-p)*pdf(x,1.5,1.2)*8;if(pa)h+=L(pa[0],pa[1],x,y1,'#2d7dd2',3);if(pb)h+=L(pb[0],pb[1],x,y0,'#e45756',3);pa=[x,y1];pb=[x,y0];}for(let x=-6;x<=6;x+=.05){let v=p*pdf(x,-1.5,1)-(1-p)*pdf(x,1.5,1.2);let v2=p*pdf(x+.05,-1.5,1)-(1-p)*pdf(x+.05,1.5,1.2);if(v*v2<0)thr.push(x)}for(const t of thr)h+=L(t,0,t,4.5,'#111',2);svg.innerHTML=h}prior.oninput=upd;upd();</script></body></html>
