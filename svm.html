<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SVM margin</title><style>body{font-family:system-ui;margin:24px;background:#fafafa;color:#222}a{color:#2454a6}.wrap{max-width:1100px;margin:auto;display:grid;grid-template-columns:680px 1fr;gap:22px}.card{background:white;border:1px solid #ddd;border-radius:16px;padding:18px;box-shadow:0 2px 10px #0001}svg{width:100%;height:auto;background:white;border:1px solid #eee;border-radius:12px}label{font-weight:700;display:block;margin-top:12px}input{width:100%}.v{font-family:monospace;background:#eee;border-radius:6px;padding:2px 6px}.note{line-height:1.45;color:#444}code{background:#f1f1f1;padding:2px 5px;border-radius:4px}</style></head><body><p><a href="index.html">← index</a></p><div class="wrap"><div class="card"><h1>SVM margin</h1><svg id="s" viewBox="0 0 680 520"></svg></div><div class="card"><label>boundary position b = <span id="bv" class="v"></span></label><input id="bi" type="range" min="-2" max="2" step=".1" value="0"><div class="note">SVM sceglie la frontiera che massimizza il margine. I support vectors sono i punti che toccano o violano il margine.</div></div></div><script>const svg=document.getElementById('s'),W=680,H=520,m=50,xmin=-5,xmax=5,ymin=-4,ymax=4;function sx(x){return m+(x-xmin)/(xmax-xmin)*(W-2*m)}function sy(y){return H-m-(y-ymin)/(ymax-ymin)*(H-2*m)}function grid(){let h='';for(let k=-5;k<=5;k++)h+=`<line x1="${sx(k)}" y1="${sy(ymin)}" x2="${sx(k)}" y2="${sy(ymax)}" stroke="#eee"/>`;for(let k=-4;k<=4;k++)h+=`<line x1="${sx(xmin)}" y1="${sy(k)}" x2="${sx(xmax)}" y2="${sy(k)}" stroke="#eee"/>`;h+=`<line x1="${sx(xmin)}" y1="${sy(0)}" x2="${sx(xmax)}" y2="${sy(0)}" stroke="#aaa"/><line x1="${sx(0)}" y1="${sy(ymin)}" x2="${sx(0)}" y2="${sy(ymax)}" stroke="#aaa"/>`;return h}function L(x1,y1,x2,y2,c,w=3,d=''){return `<line x1="${sx(x1)}" y1="${sy(y1)}" x2="${sx(x2)}" y2="${sy(y2)}" stroke="${c}" stroke-width="${w}" ${d}/>`}function C(x,y,c,r=7){return `<circle cx="${sx(x)}" cy="${sy(y)}" r="${r}" fill="${c}" stroke="#222"/>`}const pts=[[-3,-1,-1],[-2,.5,-1],[-1.2,-.6,-1],[1.2,.5,1],[2,-.4,1],[3,1,1]];function upd(){let b=+bi.value;bv.textContent=b.toFixed(1);let h=grid();h+=L(b,-4,b,4,'#111',3);h+=L(b-1,-4,b-1,4,'#777',2,'stroke-dasharray="7 7"');h+=L(b+1,-4,b+1,4,'#777',2,'stroke-dasharray="7 7"');for(const p of pts){let margin=p[2]*(p[0]-b);let col=p[2]>0?'#2d7dd2':'#e45756';h+=C(p[0],p[1],col,margin<=1.05?11:7)}h+=`<text x="${sx(-4.8)}" y="${sy(3.5)}" font-size="15">dashed lines = margins | bigger circles ≈ support vectors</text>`;svg.innerHTML=h}bi.oninput=upd;upd();</script></body></html>
