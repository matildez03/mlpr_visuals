<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PCA projection</title><style>body{font-family:system-ui;margin:24px;background:#fafafa;color:#222}a{color:#2454a6}.wrap{max-width:1100px;margin:auto;display:grid;grid-template-columns:680px 1fr;gap:22px}.card{background:white;border:1px solid #ddd;border-radius:16px;padding:18px;box-shadow:0 2px 10px #0001}svg{width:100%;height:auto;background:white;border:1px solid #eee;border-radius:12px}label{font-weight:700;display:block;margin-top:12px}input{width:100%}.v{font-family:monospace;background:#eee;border-radius:6px;padding:2px 6px}.note{line-height:1.45;color:#444}code{background:#f1f1f1;padding:2px 5px;border-radius:4px}</style></head><body><p><a href="index.html">← index</a></p><div class="wrap"><div class="card"><h1>PCA projection</h1><svg id="s" viewBox="0 0 680 520"></svg></div><div class="card"><label>angle = <span id="av" class="v"></span></label><input id="ang" type="range" min="0" max="180" value="25"><div class="note">PCA cerca la direzione su cui la proiezione conserva più varianza. Le linee grigie sono errori di ricostruzione.</div></div></div><script>const svg=document.getElementById('s'),W=680,H=520,m=50,xmin=-5,xmax=5,ymin=-4,ymax=4;function sx(x){return m+(x-xmin)/(xmax-xmin)*(W-2*m)}function sy(y){return H-m-(y-ymin)/(ymax-ymin)*(H-2*m)}function grid(){let h='';for(let k=-5;k<=5;k++){h+=`<line x1="${sx(k)}" y1="${sy(ymin)}" x2="${sx(k)}" y2="${sy(ymax)}" stroke="#eee"/>`}for(let k=-4;k<=4;k++){h+=`<line x1="${sx(xmin)}" y1="${sy(k)}" x2="${sx(xmax)}" y2="${sy(k)}" stroke="#eee"/>`}h+=`<line x1="${sx(xmin)}" y1="${sy(0)}" x2="${sx(xmax)}" y2="${sy(0)}" stroke="#aaa"/><line x1="${sx(0)}" y1="${sy(ymin)}" x2="${sx(0)}" y2="${sy(ymax)}" stroke="#aaa"/>`;return h}function circ(x,y,c,r=7){return `<circle cx="${sx(x)}" cy="${sy(y)}" r="${r}" fill="${c}" stroke="#222" stroke-width="1"/>`}function line(x1,y1,x2,y2,c,w=3){return `<line x1="${sx(x1)}" y1="${sy(y1)}" x2="${sx(x2)}" y2="${sy(y2)}" stroke="${c}" stroke-width="${w}"/>`}const pts=[[-3,-1],[-2.4,-.6],[-1.8,-.4],[-1,.1],[-.3,.2],[.6,.5],[1.2,.8],[2,1.1],[2.7,1.4],[3.4,1.7]];function upd(){let a=+ang.value;av.textContent=a+'°';let th=a*Math.PI/180,u=[Math.cos(th),Math.sin(th)],h=grid();h+=line(-5*u[0],-5*u[1],5*u[0],5*u[1],'#111',3);for(const p of pts){let t=p[0]*u[0]+p[1]*u[1],q=[t*u[0],t*u[1]];h+=line(p[0],p[1],q[0],q[1],'#bbb',1);h+=circ(q[0],q[1],'#f6bd60',5);h+=circ(p[0],p[1],'#2d7dd2')}svg.innerHTML=h}ang.oninput=upd;upd();</script></body></html>
