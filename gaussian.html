<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Gaussian PDF</title><style>body{font-family:system-ui;margin:24px;background:#fafafa;color:#222}a{color:#2454a6}.wrap{max-width:1100px;margin:auto;display:grid;grid-template-columns:680px 1fr;gap:22px}.card{background:white;border:1px solid #ddd;border-radius:16px;padding:18px;box-shadow:0 2px 10px #0001}svg{width:100%;height:auto;background:white;border:1px solid #eee;border-radius:12px}label{font-weight:700;display:block;margin-top:12px}input{width:100%}.v{font-family:monospace;background:#eee;border-radius:6px;padding:2px 6px}.note{line-height:1.45;color:#444}code{background:#f1f1f1;padding:2px 5px;border-radius:4px}</style></head><body><p><a href="index.html">← index</a></p><div class="wrap"><div class="card"><h1>Gaussian PDF</h1><svg id="s" viewBox="0 0 680 520"></svg></div><div class="card"><label>μ = <span id="mv" class="v"></span></label><input id="muI" type="range" min="-3" max="3" step=".1" value="0"><label>σ = <span id="sv" class="v"></span></label><input id="sI" type="range" min=".4" max="2.5" step=".1" value="1"><div class="note">La media sposta la campana; la deviazione standard la allarga o stringe. Area totale = 1.</div></div></div><script>const svg=document.getElementById('s'),W=680,H=520,m=50,xmin=-5,xmax=5,ymin=-4,ymax=4;function sx(x){return m+(x-xmin)/(xmax-xmin)*(W-2*m)}function sy(y){return H-m-(y-ymin)/(ymax-ymin)*(H-2*m)}function grid(){let h='';for(let k=-5;k<=5;k++){h+=`<line x1="${sx(k)}" y1="${sy(ymin)}" x2="${sx(k)}" y2="${sy(ymax)}" stroke="#eee"/>`}for(let k=-4;k<=4;k++){h+=`<line x1="${sx(xmin)}" y1="${sy(k)}" x2="${sx(xmax)}" y2="${sy(k)}" stroke="#eee"/>`}h+=`<line x1="${sx(xmin)}" y1="${sy(0)}" x2="${sx(xmax)}" y2="${sy(0)}" stroke="#aaa"/><line x1="${sx(0)}" y1="${sy(ymin)}" x2="${sx(0)}" y2="${sy(ymax)}" stroke="#aaa"/>`;return h}function circ(x,y,c,r=7){return `<circle cx="${sx(x)}" cy="${sy(y)}" r="${r}" fill="${c}" stroke="#222" stroke-width="1"/>`}function line(x1,y1,x2,y2,c,w=3){return `<line x1="${sx(x1)}" y1="${sy(y1)}" x2="${sx(x2)}" y2="${sy(y2)}" stroke="${c}" stroke-width="${w}"/>`}function upd(){let mu=+muI.value,sg=+sI.value;mv.textContent=mu.toFixed(1);sv.textContent=sg.toFixed(1);let h=grid(),prev=null;for(let i=0;i<=300;i++){let x=xmin+(xmax-xmin)*i/300,y=1/(Math.sqrt(2*Math.PI)*sg)*Math.exp(-.5*((x-mu)/sg)**2)*6;if(prev)h+=line(prev[0],prev[1],x,y,'#7b2cbf',3);prev=[x,y]}h+=line(mu,0,mu,3.5,'#e45756',2);svg.innerHTML=h}muI.oninput=sI.oninput=upd;upd();</script></body></html>
