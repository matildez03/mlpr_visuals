<!doctype html><html lang="it"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Logistic loss</title><style>body{font-family:system-ui;margin:24px;background:#fafafa;color:#222}a{color:#2454a6}.wrap{max-width:1100px;margin:auto;display:grid;grid-template-columns:680px 1fr;gap:22px}.card{background:white;border:1px solid #ddd;border-radius:16px;padding:18px;box-shadow:0 2px 10px #0001}svg{width:100%;height:auto;background:white;border:1px solid #eee;border-radius:12px}label{font-weight:700;display:block;margin-top:12px}input{width:100%}.v{font-family:monospace;background:#eee;border-radius:6px;padding:2px 6px}.note{line-height:1.45;color:#444}code{background:#f1f1f1;padding:2px 5px;border-radius:4px}</style></head><body><p><a href="index.html">← index</a></p><div class="wrap"><div class="card"><h1>Logistic loss</h1><svg id="s" viewBox="0 0 680 520"></svg></div><div class="card"><label>score s = <span id="sv" class="v"></span></label><input id="si" type="range" min="-6" max="6" step=".1" value="1"><label>true label z = <span id="zv" class="v"></span></label><input id="zi" type="range" min="-1" max="1" step="2" value="1"><div class="note">La loss è l(zs)=log(1+e^{-zs}). Se z e s hanno stesso segno, zs>0 e il costo scende. Se hanno segno opposto, il modello sbaglia e il costo cresce.</div></div></div><script>const svg=document.getElementById('s'),W=680,H=520,m=50,xmin=-6,xmax=6,ymin=-1,ymax=5;function sx(x){return m+(x-xmin)/(xmax-xmin)*(W-2*m)}function sy(y){return H-m-(y-ymin)/(ymax-ymin)*(H-2*m)}function grid(){let h='';for(let k=-6;k<=6;k++)h+=`<line x1="${sx(k)}" y1="${sy(ymin)}" x2="${sx(k)}" y2="${sy(ymax)}" stroke="#eee"/>`;for(let k=-1;k<=5;k++)h+=`<line x1="${sx(xmin)}" y1="${sy(k)}" x2="${sx(xmax)}" y2="${sy(k)}" stroke="#eee"/>`;h+=`<line x1="${sx(xmin)}" y1="${sy(0)}" x2="${sx(xmax)}" y2="${sy(0)}" stroke="#aaa"/>`;return h}function L(x1,y1,x2,y2,c,w=3){return `<line x1="${sx(x1)}" y1="${sy(y1)}" x2="${sx(x2)}" y2="${sy(y2)}" stroke="${c}" stroke-width="${w}"/>`}function C(x,y,c,r=7){return `<circle cx="${sx(x)}" cy="${sy(y)}" r="${r}" fill="${c}" stroke="#222"/>`}function upd(){let s=+si.value,z=+zi.value;sv.textContent=s.toFixed(1);zv.textContent=z;let h=grid(),prev=null;for(let i=0;i<=400;i++){let x=xmin+(xmax-xmin)*i/400,y=Math.log(1+Math.exp(-x));if(prev)h+=L(prev[0],prev[1],x,y,'#7b2cbf',3);prev=[x,y]}let x=z*s,y=Math.log(1+Math.exp(-x));h+=L(x,0,x,y,'#e45756',3)+C(x,y,'#e45756',8);h+=`<text x="${sx(-5.7)}" y="${sy(4.5)}" font-size="16">x = z·s = ${x.toFixed(2)} | loss = ${y.toFixed(2)}</text>`;svg.innerHTML=h}si.oninput=zi.oninput=upd;upd();</script></body></html>
